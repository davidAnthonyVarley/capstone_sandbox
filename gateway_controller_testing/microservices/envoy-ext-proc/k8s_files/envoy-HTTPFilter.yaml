
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: envoy-httpfilter
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: cbr-httproute
  extProc:
    - backendRefs:
        - name: envoycbr-httpfilter-sidecar-service
          port: 9002
      processingMode:
        request:
          attributes: 
            - "source.address"
            - "request.path"
