

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: h3-inspection-filter
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: UDPRoute
      name: quic-cbr-route
  wasm:
    - name: quic-inspector
      code:
        type: Image
        image:
          url: docker.io/my-org/h3-cbr-filter:latest

  
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: quic-cbr-route
spec:
  parentRefs:
    - name: udp-gateway
  rules:
    - backendRefs:
        - name: h3-backend
          port: 8443